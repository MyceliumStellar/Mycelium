name: Keep Render Backend Awake

on:
  schedule:
    # Run every 10 minutes (Render free tier sleeps after 15 mins of inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -sI https://mycelium-zgez.onrender.com/ | grep "HTTP/"
